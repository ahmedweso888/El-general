<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الجنرال خالد هاشم | El general</title>
    
    <!-- خطوط جوجل -->
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        @import url('https://cdnfonts.com');
        
        :root {
            --primary: #cda250;
            --canva-green: #043927;
            --white: #ffffff;
            --ruqaa: 'Aref Ruqaa', serif;
            --cairo: 'Cairo', sans-serif;
            --sundos: 'Sundos', 'Cairo', sans-serif;
        }
    
        
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: var(--cairo); 
        }
        
        body, html { 
            width: 100%; 
            height: 100%; 
            background-color: var(--canva-green); 
            color: var(--white); 
            scroll-behavior: smooth; 
        }

        /* 🎬 شاشة الافتتاحية السحرية بأسلوب الآيفون */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; perspective: 1000px;
        }
        .svg-container {
            width: 500px; max-width: 90%; height: auto; transform-style: preserve-3d;
            animation: rotate3D 2.5s cubic-bezier(0.4, 0, 0.2, 1) 3s forwards, goldGlow 2s ease-in-out 4.5s infinite alternate;
        }
        .svg-container svg path {
            fill: none; stroke: var(--primary); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: drawWord 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .intro-sub { font-family: var(--ruqaa); color: #666; font-size: 22px; margin-top: 25px; opacity: 0; animation: fadeInText 1s ease-out 2s forwards; }
        .skip-btn {
            margin-top: 45px; padding: 14px 40px; background: var(--primary); border: none; color: #000; font-weight: bold; border-radius: 30px;
            cursor: pointer; font-size: 16px; opacity: 0; transform: translateY(20px); box-shadow: 0 4px 20px rgba(205, 162, 80, 0.3);
            animation: fadeInButton 0.8s cubic-bezier(0.4, 0, 0.2, 1) 5s forwards;
            transition: all 0.3s ease;
        }
        .skip-btn:hover { background: #fff; transform: translateY(-3px) scale(1.03); }

        @keyframes drawWord { to { stroke-dashoffset: 0; } }
        @keyframes rotate3D { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
        @keyframes goldGlow { 0% { filter: drop-shadow(0 0 5px rgba(205, 162, 80, 0.3)); } 100% { filter: drop-shadow(0 0 25px rgba(205, 162, 80, 0.9)); } }
        @keyframes fadeInText { to { opacity: 1; } }
        @keyframes fadeInButton { to { opacity: 1; transform: translateY(0); } }

        /* 👑 تصميم الصفحة الأولى (Hero Section) */
        .page-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }
        
        .hero-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
        }

        .images-section {
            display: flex;
            flex: 1;
            gap: 30px;
            align-items: center;
            justify-content: center;
        }

        .profile-card-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .img-right {
            width: 260px;
            height: 380px;
            object-fit: cover;
            border-radius: 120px 120px 20px 20px;
            border: 2px solid var(--primary);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .profile-card-right span {
            font-size: 16px;
            color: #ffffff;
            font-weight: 500;
        }

        .main-banner-card {
            width: 500px;
            height: 360px;
            object-fit: cover;
            border-radius: 60px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 45px rgba(0,0,0,0.5);
        }

        .text-section {
            flex: 0.8;
            text-align: right;
        }
        .text-section h1 {
            font-family: var(--ruqaa);
            font-size: 85px;
            color: var(--white);
            line-height: 1.1;
        }
        .text-section .sub-title {
            font-family: var(--ruqaa);
            font-size: 80px;
            color: var(--white);
        }
        /* 🏛️ تصميم الصفحة الثانية (ليه تختار الجنرال) */
        .page-two-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            align-items: center;
            justify-content: space-between;
            gap: 60px;
        }

        .image-box-p2 {
            flex: 1;
            display: flex;
            justify-content: center;
        }
        .img-page2 {
            width: 440px;
            height: 520px;
            object-fit: cover;
            border-radius: 80px;
            border: 5px solid var(--white);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .text-box-p2 {
            flex: 1.2;
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .text-box-p2 h2 {
            font-size: 55px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -1px;
        }
        
        .wave-line {
            width: 180px;
            height: auto;
            margin-top: -10px;
            opacity: 0.8;
        }

        .text-box-p2 p {
            font-size: 20px;
            font-weight: 600;
            color: #e0e8e5;
            line-height: 1.8;
            max-width: 500px;
        }

        /* 📞 تصميم الصفحة الثالثة (احجز الآن مع الجنرال) */
        .page-three-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            align-items: center;
            gap: 35px;
            text-align: center;
        }
        /* 💬 تصميم الصفحة الرابعة (آراء طلابنا - شات الواتساب) */
        .page-four-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            align-items: center;
            gap: 30px;
            text-align: center;
        }

        .review-title {
            font-family: var(--sundos), var(--cairo); /* تطبيق خط Sondos الفني */
            font-size: 55px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 10px;
        }

        /* حاوية المحادثة الشبيهة بالواتساب كما في التصميم */
        .whatsapp-chat-box {
            width: 850px;
            max-width: 100%;
            background-color: #1e2222; /* لون الخلفية الرمادي الداكن للفقاعة */
            border-radius: 40px;
            padding: 30px 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        /* شارة التاريخ التلقائية (اليوم) في المنتصف */
        .chat-date-badge {
            background-color: #111414;
            color: #8696a0;
            font-size: 14px;
            padding: 6px 20px;
            border-radius: 10px;
            align-self: center;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* نص المحادثة المنسق والسميك */
        .chat-text-content {
            text-align: right;
            color: #e9edef;
            font-size: 24px;
            font-weight: 600;
            line-height: 1.8;
            white-space: pre-line; /* الحفاظ على نزول السطور التلقائي */
        }

        /* توقيت الرسالة في الأسفل */
        .chat-time {
            align-self: flex-start;
            color: #8696a0;
            font-size: 14px;
            margin-top: 5px;
            direction: ltr;
        }

        /* استجابة الصفحة الرابعة للموبايل */
        @media (max-width: 1024px) {
            .review-title { font-size: 38px; }
            .whatsapp-chat-box { padding: 20px; }
            .chat-text-content { font-size: 18px; line-height: 1.6; }
        }

        .main-banner-p3 {
            width: 850px;
            max-width: 100%;
            height: auto;
            border-radius: 70px; /* الحواف الدائرية الكبيرة للبانر */
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
                 /* 🌟 تصميم الصفحة الخامسة بالصورة والأبعاد الأصلية */
        .page-five-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            gap: 40px;
            text-align: center;
            margin: 0 auto;
        }

        /* ضبط أبعاد صورة النيون الفيروزي لتطابق لقطة الشاشة */
        .neon-image-banner {
            width: 850px;
            max-width: 95%;
            height: auto;
            object-fit: contain;
            /* إضافة أنيميشن نبض الإضاءة لتظل حية وسينمائية فوق الصورة */
            filter: drop-shadow(0 0 10px rgba(100, 255, 237, 0.3));
            animation: imgGlowPulse 2s infinite alternate ease-in-out;
        }

        /* زر المواصلة بالأسفل بنص أحمر وخلفية سوداء */
        .continue-platform-btn {
            background-color: #000000;
            color: #ff3333; 
            font-family: var(--cairo);
            font-size: 16px;
            font-weight: 700;
            padding: 12px 45px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        .continue-platform-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(100, 255, 237, 0.4);
            border-color: rgba(100, 255, 237, 0.3);
        }

        @keyframes imgGlowPulse {
            0% { filter: drop-shadow(0 0 10px rgba(100, 255, 237, 0.3)); }
            100% { filter: drop-shadow(0 0 25px rgba(100, 255, 237, 0.7)); }
        }


        /* استجابة الصفحة الخامسة للموبايل */
        @media (max-width: 1024px) {
            .neon-glow-title { font-size: 60px; }
            .neon-divider { width: 300px; }
            .continue-platform-btn { padding: 10px 30px; font-size: 14px; }
        }

        /* تنسيق الخطوط بناءً على طلبك ونوع خط سندس */
        .booking-title {
            font-family: var(--sundos), var(--cairo); /* تطبيق خط Sondos المخصص */
            font-size: 42px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: 0.5px;
            margin-top: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .numbers-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            margin-top: 5px;
        }

        .phone-number {
            font-family: var(--cairo);
            font-size: 32px;
            font-weight: 700;
            color: var(--primary); /* اللون الذهبي الملكي للأرقام */
            letter-spacing: 1px;
            direction: ltr; /* اتجاه الأرقام من اليسار لليمين */
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        /* استجابة الشاشات والموبايل */
        @media (max-width: 1024px) {
            .page-section { padding: 60px 20px; min-height: auto; }
            .hero-container, .page-two-container { flex-direction: column-reverse; text-align: center; gap: 40px; }
            .text-section, .text-box-p2 { text-align: center; align-items: center; }
            .text-section h1, .text-section .sub-title { font-size: 55px; }
            .text-box-p2 h2 { font-size: 40px; }
            .text-box-p2 p { font-size: 18px; }
            .images-section { flex-direction: column; gap: 30px; }
            .main-banner-card { width: 100%; max-width: 450px; height: auto; }
            .img-page2 { width: 100%; max-width: 360px; height: auto; }
            .booking-title { font-size: 28px; padding: 0 10px; }
            .numbers-container { flex-direction: column; gap: 15px; }
            .phone-number { font-size: 26px; }
        }
    </style>
</head>
<body>

    <!-- الافتتاحية التفاعلية 3D للجنرال -->
    <div id="intro-overlay">
        <div class="svg-container">
            
            <svg viewBox="0 0 450 150" width="100%" height="100%">
                <path d="M 380,20 L 380,110" /><path d="M 350,20 L 350,105 L 310,105" />
                <path d="M 320,60 C 290,55 270,75 290,95 L 260,95" /><path d="M 260,95 L 230,95 C 210,95 200,75 220,60" />
                <path d="M 190,95 C 170,110 150,125 130,125" /><path d="M 120,20 L 120,105" /><path d="M 80,20 L 80,105 C 80,135 30,135 40,100" />
                <path d="M 285,120 A 4,4 0 1,1 284.9,120" stroke-width="6" /><path d="M 222,45 A 4,4 0 1,1 221.9,45" stroke-width="6" />
            </svg>
        </div>
        <div class="intro-sub">El General Khaled Hashem</div>
        <button class="skip-btn" onclick="closeIntro()">المتابعة إلى المنصة 🏛️</button>
    </div>

    <!-- 🟢 الصفحة الأولى للمنصة -->
    <section class="page-section">
        <div class="hero-container">
            <div class="images-section">
                <img class="main-banner-card" src="nat5.png" alt="الجنرال خالد هاشم في التاريخ والجغرافيا">
                <div class="profile-card-right">
                    <img class="img-right" src="nat2.png" alt="Genral Khaled Hashem">
                    <span>Genral \ Khaled Hashem</span>
                </div>
            </div>
            <div class="text-section">
                <h1>الجنرال /</h1>
                <div class="sub-title">خالد هاشم</div>
            </div>
        </div>
    </section>

    <!-- 🟢 الصفحة الثانية للمنصة (ليه تختار الجنرال) -->
    <section class="page-section" style="background-color: #043927; border-top: 1px solid rgba(255,255,255,0.05);">
        <div class="page-two-container">
            <div class="image-box-p2">
                <img class="img-page2" src="nat4.png" alt="لماذا تختار مستر خالد هاشم">
            </div>
            <div class="text-box-p2">
                <h2>ليه تختار الجنرال</h2>
                <svg class="wave-line" viewBox="0 0 100 10" fill="none" stroke="white" stroke-width="1.5">
                    <path d="M 0,5 Q 12.5,0 25,5 T 50,5 T 75,5 T 100,5" stroke-linecap="round"/>
                </svg>
                <p>الجنرال مش بيشرح لك التاريخ كـ مادة لا بيشرحها كـ قصة كاملة و كـ حياة بنعيشها 😉</p>
            </div>
        </div>
    </section>

    <!-- 🟢 الصفحة الثالثة للمنصة (احجز الآن المكتوبة بخط Sondos) -->
    <section class="page-section" style="background-color: #043927; border-top: 1px solid rgba(255,255,255,0.05);">
        <div class="page-three-container">
            <!-- صورة البانر الفنية الكبيرة الثالثة -->
            <img class="main-banner-p3" src="nat3.png" alt="احجز مكانك مع الجنرال خالد هاشم">
            
            <!-- نص حجز المكان المعزز بخط Sondos المميز -->
            <h2 class="booking-title">احجز الان مكانك مع الجنرال / خالد هاشم</h2>
            
            <!-- أرقام الهواتف والتواصل المكتوبة بوضوح -->
            <div class="numbers-container">
                <div class="phone-number">01272925440</div>
                <div class="phone-number">01060007191</div>
            </div>
        </div>
    </section>
        <!-- 🟢 الصفحة الرابعة للمنصة (آراء طلابنا المكتوبة بالكامل بخط السندس) -->
    <section class="page-section" style="background-color: #043927; border-top: 1px solid rgba(255,255,255,0.05);">
        <div class="page-four-container">
            <!-- العنوان الرئيسي بخط Sondos -->
            <h2 class="review-title">آراء طلابنا</h2>
            
            <!-- كارد المحادثة الداكن المنسق على طريقة محادثات الواتساب -->
            <img src="nat6.png" alt="رأي الطلاب" style="width: 850px; max-width: 95%; height: auto; border-radius: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); margin: 0 auto; display: block;">
        </div>
    </section>

      <!-- 🟢 الصفحة الخامسة للمنصة (المواصلة للجنرال كصورة أصلية مضيئة) -->
    <section class="page-section" style="background-color: #043927; border-top: 1px solid rgba(255,255,255,0.05);">
        <div class="page-five-container">
            
            <!-- الصورة الأصلية المرفوعة بأبعادها الفيروزية الكاملة -->
            <img class="neon-image-banner" src="nat.png" alt="المواصلة للجنرال">
            
            <!-- زر المتابعة للمنصة -->
            <button class="continue-platform-btn">المواصلة للمنصة</button>
        </div>
    </section>
    <script>
        function closeIntro() {
            const overlay = document.getElementById('intro-overlay');
            overlay.style.transition = "opacity 0.5s ease"; overlay.style.opacity = 0;
            setTimeout(() => overlay.style.display = 'none', 500);
        }
    </script>
</body>
</html>
